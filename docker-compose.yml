version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
      - ./backend/app:/app/app
      - ./.cursor:/app/.cursor
    env_file:
      - ./backend/.env
    environment:
      # Override CORS_ORIGINS directly to avoid .env parsing issues
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    command: npm run dev
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./backend/uploads:/usr/share/nginx/html/uploads
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
